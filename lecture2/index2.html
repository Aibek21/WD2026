<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>

    <style>

        .parent-container {
            display: flex;
            flex-direction: row-reverse;
            justify-content: space-between;
            align-content: center;
        }

        .container {
            background-color: blue;
            width: 100px;
            height: 100px;
            /*padding: 10px;*/
            border: 5px solid red;
            position: relative;
            display: inline-block;
        }

        .sub-container {
            width: 50px;
            height: 50px;
            background-color: green;
            position: absolute;
            top: 20px;
            left: 20px
        }
    </style>
</head>
<body>
<div class="parent-container">
    <div class="container">
        <div class="sub-container"></div>
    </div>
    <div class="container"></div>
    <div class="container"></div>
</div>
</body>
</html>
